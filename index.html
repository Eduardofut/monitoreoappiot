<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Vibración - Servidores de Respaldo</title>
    
    <!-- LIBRERÍAS DE RESPALDO: Usamos servidores CDN alternativos para saltar el bloqueo de tu red -->
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>

    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .value { font-size: 3.5rem; font-weight: bold; color: #00b4d8; margin: 10px 0; }
        .status-box { background: #e0f2fe; color: #0369a1; padding: 10px; border-radius: 6px; margin-top: 10px; font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Monitoreo de Vibración</h1>
        
        <div class="card">
            <h2>Valor Actual (Potentiometer)</h2>
            <div id="realtime-value" class="value">Conectando...</div>
            <p id="last-update" style="color: #7f8c8d;">Estableciendo enlace de datos...</p>
            <div id="debug-status" class="status-box">Estado: Iniciando conexión alternativa...</div>
        </div>

        <div class="card">
            <h2>Historial de Vibraciones</h2>
            <div style="position: relative; height: 300px;"><canvas id="historyChart"></canvas></div>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('debug-status');
        const valueEl = document.getElementById('realtime-value');
        const updateEl = document.getElementById('last-update');

        function mostrarError(titulo, err) {
            statusEl.style.background = "#fee2e2";
            statusEl.style.color = "#991b1b";
            statusEl.innerText = `${titulo}: ${err.message || JSON.stringify(err)}`;
            valueEl.innerText = "Fallo";
        }

        try {
            // Verificación segura de carga de la librería
            if (typeof supabase === 'undefined') {
                throw new Error("El segundo servidor de librerías también fue bloqueado por tu red.");
            }

            statusEl.innerText = "Estado: Conectando a la base de datos Supabase...";
            
            // 1. CREDENCIALES (Asegúrate de colocar tu URL y Clave Anon aquí)
            const SUPABASE_URL = 'https://vkiaothjjovayrzowqmu.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZraWFvdGhqam92YXlyem93cW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NjY5NTEsImV4cCI6MjA5OTE0Mjk1MX0.k5er8vtVBT9tBCL7tPuiNULNZOqMeX2kLOp36-EgxPY';
            
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // 2. CONFIGURACIÓN DEL GRÁFICO (Chart.js versión estándar)
            statusEl.innerText = "Estado: Configurando gráfico histórico...";
            const ctx = document.getElementById('historyChart').getContext('2d');
            const historyChart = new Chart(ctx, {
                type: 'line',
                data: { 
                    labels: [], 
                    datasets: [{ 
                        label: 'Potentiometer', 
                        data: [], 
                        borderColor: '#00b4d8', 
                        backgroundColor: 'rgba(0, 180, 216, 0.1)', 
                        fill: true, 
                        tension: 0.2 
                    }] 
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 3. OBTENER HISTORIAL DESDE LA TABLA
            async function fetchHistory() {
                statusEl.innerText = "Estado: Solicitando registros históricos de 'vibracion'...";
                try {
                    const { data, error } = await supabaseClient
                        .from('vibracion')
                        .select('update_at, potentiometer')
                        .order('update_at', { ascending: false })
                        .limit(20);

                    if (error) {
                        mostrarError("Error de lectura en Supabase", error);
                        return;
                    }

                    if (!data || data.length === 0) {
                        statusEl.innerText = "Estado: Conectado con éxito. Pero tu tabla está vacía.";
                        valueEl.innerText = "0";
                        return;
                    }

                    // Acomodar datos cronológicamente en el gráfico
                    const orderedData = data.reverse();
                    orderedData.forEach(row => {
                        const time = new Date(row.update_at).toLocaleTimeString();
                        historyChart.data.labels.push(time);
                        historyChart.data.datasets[0].data.push(row.potentiometer); // Fijo: acceso correcto al primer dataset [0]
                    });
                    historyChart.update();
                    
                    const last = orderedData[orderedData.length - 1];
                    valueEl.innerText = last.potentiometer;
                    updateEl.innerText = `Última actualización: ${new Date(last.update_at).toLocaleTimeString()}`;
                    statusEl.innerText = "Estado: Listo. Monitoreando en tiempo real...";

                } catch (fetchErr) {
                    mostrarError("Error en procesamiento de datos", fetchErr);
                }
            }

            // 4. ESCUCHAR EN TIEMPO REAL
            supabaseClient
                .channel('cambios-vibracion')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'vibracion' }, (payload) => {
                    const newRecord = payload.new;
                    const newTime = new Date(newRecord.update_at).toLocaleTimeString();
                    
                    valueEl.innerText = newRecord.potentiometer;
                    updateEl.innerText = `Última actualización: ${newTime}`;
                    
                    historyChart.data.labels.push(newTime);
                    historyChart.data.datasets[0].data.push(newRecord.potentiometer); // Fijo: acceso correcto al primer dataset [0]
                    
                    if (historyChart.data.labels.length > 20) {
                        historyChart.data.labels.shift();
                        historyChart.data.datasets[0].data.shift();
                    }
                    historyChart.update();
                    statusEl.innerText = `Estado: Nuevo dato recibido en vivo (${newRecord.potentiometer})`;
                })
                .subscribe();

            fetchHistory();

        } catch (globalErr) {
            mostrarError("Error interno", globalErr);
        }
    </script>
</body>
</html>
