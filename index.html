<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Vibración - Solución Local</title>
    
    <!-- NUEVAS LIBRERÍAS DE RESPALDO (Compatibles con apertura por doble clic local) -->
    <script src="https://cloudflare.com" integrity="sha512-8Nn0T5p3uPshYv8pP2D20vP83M68S89FjNscO57v3E2lC5I084LhG41S/R7e6u3RscMvKbyoI0M6t2S06A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://jsdelivr.net"></script>

    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .value { font-size: 3.5rem; font-weight: bold; color: #00b4d8; margin: 10px 0; }
        .status-box { background: #e0f2fe; color: #0369a1; padding: 10px; border-radius: 6px; margin-top: 10px; font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Monitoreo de Vibración</h1>
        
        <div class="card">
            <h2>Valor Actual (Potentiometer)</h2>
            <div id="realtime-value" class="value">Iniciando...</div>
            <p id="last-update" style="color: #7f8c8d;">Conectando...</p>
            <div id="debug-status" class="status-box">Estado: Cargando JavaScript local...</div>
        </div>

        <div class="card">
            <h2>Historial de Vibraciones</h2>
            <div style="position: relative; height: 300px;"><canvas id="historyChart"></canvas></div>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('debug-status');
        const valueEl = document.getElementById('realtime-value');
        const updateEl = document.getElementById('last-update');

        // Función para atrapar fallos e informarte en pantalla de inmediato
        function mostrarError(titulo, err) {
            statusEl.style.background = "#fee2e2";
            statusEl.style.color = "#991b1b";
            statusEl.innerText = `${titulo}: ${err.message || err}`;
            valueEl.innerText = "Fallo";
        }

        try {
            statusEl.innerText = "Estado: Verificando librerías...";

            // Verificación manual de que la librería fue descargada por el navegador
            if (typeof supabase === 'undefined') {
                mostrarError("Error crítico", "La librería de Supabase sigue bloqueada por tu navegador o red.");
            } else {
                statusEl.innerText = "Estado: Librerías cargadas. Inicializando conexión...";

                // 1. CREDENCIALES (Reemplaza con tus datos de Supabase)
                const SUPABASE_URL = 'https://vkiaothjjovayrzowqmu.supabase.co';
                const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZraWFvdGhqam92YXlyem93cW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NjY5NTEsImV4cCI6MjA5OTE0Mjk1MX0.k5er8vtVBT9tBCL7tPuiNULNZOqMeX2kLOp36-EgxPY';
                
                // Creación usando la librería global cargada
                const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                statusEl.innerText = "Estado: Conexión establecida con éxito.";

                // 2. CONFIGURACIÓN DEL GRÁFICO (Chart.js)
                const ctx = document.getElementById('historyChart').getContext('2d');
                const historyChart = new Chart(ctx, {
                    type: 'line',
                    data: { 
                        labels: [], 
                        datasets: [{ 
                            label: 'Potentiometer', 
                            data: [], 
                            borderColor: '#00b4d8', 
                            backgroundColor: 'rgba(0,180,216,0.1)', 
                            fill: true, 
                            tension: 0.2 
                        }] 
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });

                // 3. CONSULTAR DATOS HISTÓRICOS
                async function fetchHistory() {
                    statusEl.innerText = "Estado: Extrayendo datos de la tabla 'vibracion'...";
                    try {
                        const { data, error } = await supabaseClient
                            .from('vibracion')
                            .select('update_at, potentiometer')
                            .order('update_at', { ascending: false })
                            .limit(20);

                        if (error) {
                            mostrarError("Error Supabase (Revisa políticas RLS)", error);
                            return;
                        }

                        if (!data || data.length === 0) {
                            statusEl.innerText = "Estado: Conectado. Pero tu tabla 'vibracion' no tiene datos guardados.";
                            valueEl.innerText = "0";
                            return;
                        }

                        // Acomodar datos cronológicamente en la gráfica
                        const orderedData = data.reverse();
                        orderedData.forEach(row => {
                            const time = new Date(row.update_at).toLocaleTimeString();
                            historyChart.data.labels.push(time);
                            historyChart.data.datasets[0].data.push(row.potentiometer); // Arreglado índice explícito de datasets
                        });
                        historyChart.update();
                        
                        const last = orderedData[orderedData.length - 1];
                        valueEl.innerText = last.potentiometer;
                        updateEl.innerText = `Última actualización: ${new Date(last.update_at).toLocaleTimeString()}`;
                        statusEl.innerText = "Estado: Listo. Monitoreando vibración en tiempo real...";

                    } catch (fetchErr) {
                        mostrarError("Error procesando historial", fetchErr);
                    }
                }

                // 4. CONFIGURAR TIEMPO REAL
                supabaseClient
                    .channel('cambios-vibracion')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'vibracion' }, (payload) => {
                        const newRecord = payload.new;
                        const newTime = new Date(newRecord.update_at).toLocaleTimeString();
                        
                        valueEl.innerText = newRecord.potentiometer;
                        updateEl.innerText = `Última actualización: ${newTime}`;
                        
                        historyChart.data.labels.push(newTime);
                        historyChart.data.datasets[0].data.push(newRecord.potentiometer);
                        
                        if (historyChart.data.labels.length > 20) {
                            historyChart.data.labels.shift();
                            historyChart.data.datasets[0].data.shift();
                        }
                        historyChart.update();
                        statusEl.innerText = `Estado: Nuevo dato recibido (${newRecord.potentiometer})`;
                    })
                    .subscribe();

                // Iniciar descarga inicial
                fetchHistory();
            }

        } catch (globalErr) {
            mostrarError("Error de código interno", globalErr);
        }
    </script>
</body>
</html>
