<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Vibración Industrial</title>
    <link rel="icon" type="image/png" href="xinquan2.png">
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: #1e293b; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card h2 { margin-top: 0; font-size: 1.2rem; color: #475569; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .realtime-val { font-size: 2rem; font-weight: bold; color: #2563eb; margin: 15px 0; text-align: center; }
        .unit { font-size: 1rem; color: #64748b; }
        button { display: block; width: 100%; max-width: 200px; margin: 20px auto; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Panel de Monitoreo de Vibración en Tiempo Real</h1>
    <button onclick="actualizarDatos()">🔄 Actualizar Panel</button>
    <div class="grid">
        <div class="card">
            <h2>Motor 1 - Bomba de Valve Gates</h2>
            <div id="val-motor1" class="realtime-val">0.0000 <span class="unit">m/s² RMS</span></div>
            <div id="grafica-motor1"></div>
        </div>
        <div class="card">
            <h2>Motor 2 - Bomba Hidraulica principal</h2>
            <div id="val-motor2" class="realtime-val">0.0000 <span class="unit">m/s² RMS</span></div>
            <div id="grafica-motor2"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://qcsfcpfdzthykyihjyze.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjc2ZjcGZkenRoeWt5aWhqeXplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTQ3MDMsImV4cCI6MjA5ODY5MDcwM30.b9SukBBjK35vTIQQ7xUp7WZs5mHNKWcEjpgxtXsLCzk";

    const opcionesBase = {
        chart: { type: 'line', height: 300, animations: { enabled: true } },
        stroke: { curve: 'smooth', width: 3 },
        xaxis: { type: 'category', title: { text: 'Tiempo' }, labels: { show: false } },
        yaxis: { title: { text: 'm/s² RMS' }, min: 0 },
        dataLabels: { enabled: false }
    };

    const chartMotor1 = new ApexCharts(document.querySelector("#grafica-motor1"), {...opcionesBase, colors: ['#2563eb'], series: [{name: 'Vibración', data: []}]});
    const chartMotor2 = new ApexCharts(document.querySelector("#grafica-motor2"), {...opcionesBase, colors: ['#10b981'], series: [{name: 'Vibración', data: []}]});
    chartMotor1.render();
    chartMotor2.render();

    async function actualizarDatos() {
        try {
            const respuesta = await fetch(`${SUPABASE_URL}?select=*&order=created_at.desc&limit=50`, {
                headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
            });
            const datos = await respuesta.json();
            const datosM1 = datos.filter(d => d.dispositivo === "Motor_1").reverse();
            const datosM2 = datos.filter(d => d.dispositivo === "Motor_2").reverse();

            if(datosM1.length > 0) {
                const ultimoValM1 = datosM1[datosM1.length - 1].vibracion_rms;
                document.getElementById('val-motor1').innerHTML = `${ultimoValM1.toFixed(4)} <span class="unit">m/s² RMS</span>`;
                chartMotor1.updateSeries([{ data: datosM1.map(d => d.vibracion_rms) }]);
            }
            if(datosM2.length > 0) {
                const ultimoValM2 = datosM2[datosM2.length - 1].vibracion_rms;
                document.getElementById('val-motor2').innerHTML = `${ultimoValM2.toFixed(4)} <span class="unit">m/s² RMS</span>`;
                chartMotor2.updateSeries([{ data: datosM2.map(d => d.vibracion_rms) }]);
            }
        } catch (error) {
            console.error("Error al conectar con Supabase:", error);
        }
    }

    actualizarDatos();
    setInterval(actualizarDatos, 4000);
</script>
</body>
</html>
