<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Vibración - Funcionando Seguro</title>

    </script>

    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 700px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .value { font-size: 3.5rem; font-weight: bold; color: #00b4d8; margin: 10px 0; }
        .status-box { background: #e0f2fe; color: #0369a1; padding: 10px; border-radius: 6px; margin-top: 10px; font-family: monospace; font-size: 0.9rem; }
        
        /* Gráfica nativa en HTML/CSS */
        .chart-pure { display: flex; align-items: flex-end; justify-content: space-between; height: 200px; background: #f8fafc; border-bottom: 2px solid #cbd5e1; padding: 10px; box-sizing: border-box; }
        .bar-container { display: flex; flex-direction: column; align-items: center; flex: 1; margin: 0 2px; }
        .bar { width: 100%; background: #00b4d8; border-radius: 4px 4px 0 0; transition: height 0.3s ease; min-height: 2px; }
        .bar-label { font-size: 0.7rem; color: #64748b; margin-top: 5px; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Monitoreo de Vibración</h1>
        
        <div class="card">
            <h2>Valor Actual (Potentiometer)</h2>
            <div id="realtime-value" class="value">Conectando...</div>
            <p id="last-update" style="color: #7f8c8d;">Estableciendo enlace de datos...</p>
            <div id="debug-status" class="status-box">Estado: Iniciando...</div>
        </div>

        <div class="card">
            <h2>Historial de Vibraciones (HTML Puro)</h2>
            <div id="html-chart" class="chart-pure"></div>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('debug-status');
        const valueEl = document.getElementById('realtime-value');
        const updateEl = document.getElementById('last-update');
        const chartEl = document.getElementById('html-chart');

        let datosHistoricos = [];

        function mostrarError(titulo, err) {
            statusEl.style.background = "#fee2e2";
            statusEl.style.color = "#991b1b";
            statusEl.innerText = `${titulo}: ${err.message || JSON.stringify(err)}`;
            valueEl.innerText = "Fallo";
        }

        function actualizarGraficaNativa() {
            chartEl.innerHTML = ''; 
            const valores = datosHistoricos.map(d => d.valor);
            const maxVal = Math.max(...valores, 1);

            datosHistoricos.forEach(item => {
                const porcentajeAltura = (item.valor / maxVal) * 100;
                
                const container = document.createElement('div');
                container.className = 'bar-container';
                
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${porcentajeAltura}%`;
                bar.title = `Valor: ${item.valor} - Hora: ${item.hora}`;
                
                const label = document.createElement('div');
                label.className = 'bar-label';
                label.innerText = item.hora;

                container.appendChild(bar);
                container.appendChild(label);
                chartEl.appendChild(container);
            });
        }

        try {
            // 1. CREDENCIALES (Coloca tus datos aquí)
            const SUPABASE_URL = 'https://vkiaothjjovayrzowqmu.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZraWFvdGhqam92YXlyem93cW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NjY5NTEsImV4cCI6MjA5OTE0Mjk1MX0.k5er8vtVBT9tBCL7tPuiNULNZOqMeX2kLOp36-EgxPY';
            
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // 2. FUNCIÓN DE CONSULTA REPETITIVA (Auto-actualizable cada 2 segundos)
            async function fetchHistory() {
                try {
                    const { data, error } = await supabaseClient
                        .from('vibracion')
                        .select('update_at, potentiometer')
                        .order('update_at', { ascending: false })
                        .limit(12); // Últimos 12 registros en pantalla

                    if (error) {
                        mostrarError("Error en Supabase", error);
                        return;
                    }

                    if (!data || data.length === 0) {
                        statusEl.innerText = "Estado: Conectado. Pero la tabla está vacía.";
                        valueEl.innerText = "Sin Datos";
                        return;
                    }

                    // Procesar y ordenar cronológicamente
                    datosHistoricos = data.reverse().map(row => ({
                        hora: new Date(row.update_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'}),
                        valor: Number(row.potentiometer)
                    }));

                    actualizarGraficaNativa();
                    
                    const last = datosHistoricos[datosHistoricos.length - 1];
                    valueEl.innerText = last.valor;
                    updateEl.innerText = `Última actualización: ${last.hora}`;
                    statusEl.innerText = "Estado: Actualizando datos automáticamente cada 2 segundos.";

                } catch (fetchErr) {
                    mostrarError("Error procesando datos", fetchErr);
                }
            }

            // Arrancar la primera consulta inmediatamente
            fetchHistory();

            // CORRECCIÓN DEFINITIVA: Consultar los datos de Supabase en bucle constante cada 2000 milisegundos
            setInterval(fetchHistory, 2000);

        } catch (globalErr) {
            mostrarError("Error interno", globalErr);
        }
    </script>
</body>
</html>
