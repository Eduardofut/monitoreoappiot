<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo de Vibración - Corregido</title>

    <!-- LIBRERÍA CHART.JS CON RESPALDO CDN ORIGINAL -->
    <script src="https://jsdelivr.net"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; padding: 20px; text-align: center; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .value { font-size: 4rem; font-weight: 800; color: #0284c7; margin: 10px 0; }
        .status-box { background: #e0f2fe; color: #0369a1; padding: 12px; border-radius: 8px; margin-top: 15px; font-family: monospace; font-size: 0.9rem; }
        .chart-container { position: relative; height: 320px; width: 100%; }
        h1 { color: #0f172a; font-size: 2rem; margin-bottom: 25px; }
        h2 { color: #475569; font-size: 1.25rem; margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Monitoreo de Vibración</h1>
        
        <div class="card">
            <h2>Valor Actual (Potentiometer)</h2>
            <div id="realtime-value" class="value">Conectando...</div>
            <p id="last-update" style="color: #64748b; font-size: 0.95rem;">Estableciendo enlace de datos...</p>
            <div id="debug-status" class="status-box">Estado: Iniciando...</div>
        </div>

        <div class="card">
            <h2>Historial de Vibraciones en Tiempo Real</h2>
            <div class="chart-container">
                <canvas id="liveChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('debug-status');
        const valueEl = document.getElementById('realtime-value');
        const updateEl = document.getElementById('last-update');
        
        let miGraficaInstance = null; 
        let ultimoTimeTag = null; 
        const MAX_PUNTOS = 15; 

        function mostrarError(titulo, err) {
            statusEl.style.background = "#fee2e2";
            statusEl.style.color = "#991b1b";
            statusEl.innerText = `${titulo}: ${err.message || JSON.stringify(err)}`;
            valueEl.innerText = "--";
        }

        function inicializarGrafica() {
            try {
                const ctx = document.getElementById('liveChart').getContext('2d');
                
                const gradient = ctx.createLinearGradient(0, 0, 0, 300);
                gradient.addColorStop(0, 'rgba(2, 132, 199, 0.4)');
                gradient.addColorStop(1, 'rgba(2, 132, 199, 0.0)');

                // CORRECCIÓN: Se usa "new Chart" correctamente referenciando la clase global de la CDN
                miGraficaInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: 'Vibración',
                            data: [],
                            borderColor: '#0284c7',
                            borderWidth: 3,
                            backgroundColor: gradient,
                            fill: true,
                            tension: 0.4, 
                            pointBackgroundColor: '#0284c7',
                            pointRadius: 4,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { display: false }, ticks: { color: '#64748b' } },
                            y: { 
                                grid: { color: '#e2e8f0' }, 
                                ticks: { color: '#64748b' },
                                beginAtZero: true
                            }
                        }
                    }
                });
            } catch(e) {
                mostrarError("Error cargando la librería gráfica", e);
            }
        }

        try {
            const SUPABASE_URL = 'https://supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZraWFvdGhqam92YXlyem93cW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NjY5NTEsImV4cCI6MjA5OTE0Mjk1MX0.k5er8vtVBT9tBCL7tPuiNULNZOqMeX2kLOp36-EgxPY';
            
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            async function fetchHistory() {
                try {
                    const { data, error } = await supabaseClient
                        .from('vibracion')
                        .select('update_at, potentiometer')
                        .order('update_at', { ascending: false })
                        .limit(MAX_PUNTOS);

                    if (error) { return mostrarError("Error en Supabase", error); }
                    if (!data || data.length === 0) {
                        statusEl.innerText = "Estado: Conectado. Tabla vacía.";
                        return;
                    }

                    // Tomamos la fila más reciente (índice 0 por el orden desc)
                    const registroMasReciente = data[0]; 
                    const nuevaHora = new Date(registroMasReciente.update_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                    const nuevoValor = Number(registroMasReciente.potentiometer);

                    // Si la gráfica está vacía, la poblamos inicialmente
                    if (miGraficaInstance.data.labels.length === 0) {
                        // Invertimos una copia para mostrar orden cronológico de izquierda a derecha
                        const historicoCronologico = [...data].reverse();
                        
                        historicoCronologico.forEach(row => {
                            const horaFormateada = new Date(row.update_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                            miGraficaInstance.data.labels.push(horaFormateada);
                            miGraficaInstance.data.datasets[0].data.push(Number(row.potentiometer)); // CORRECCIÓN: Acceso directo a datasets[0]
                        });
                        
                        miGraficaInstance.update();
                        ultimoTimeTag = registroMasReciente.update_at;
                    } 
                    // Si ya tiene datos, añadimos el nuevo punto solo si cambió la estampa de tiempo
                    else if (registroMasReciente.update_at !== ultimoTimeTag) {
                        miGraficaInstance.data.labels.push(nuevaHora);
                        miGraficaInstance.data.datasets[0].data.push(nuevoValor);

                        if (miGraficaInstance.data.labels.length > MAX_PUNTOS) {
                            miGraficaInstance.data.labels.shift();
                            miGraficaInstance.data.datasets[0].data.shift();
                        }
                        
                        miGraficaInstance.update('none'); 
                        ultimoTimeTag = registroMasReciente.update_at;
                    }

                    // Actualizar textos en pantalla
                    valueEl.innerText = nuevoValor;
                    updateEl.innerText = `Última actualización: ${nuevaHora}`;
                    statusEl.style.background = "#e0f2fe";
                    statusEl.style.color = "#0369a1";
                    statusEl.innerText = "Estado: Monitoreando fluctuaciones en tiempo real de forma exitosa.";

                } catch (fetchErr) {
                    mostrarError("Error procesando datos", fetchErr);
                }
            }

            // Arrancar el flujo
            inicializarGrafica();
            fetchHistory();
            setInterval(fetchHistory, 2000);

        } catch (globalErr) {
            mostrarError("Error interno", globalErr);
        }
    </script>
</body>
</html>
